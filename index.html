<!DOCTYPE html>
<html>
<head>
<title>ExamPro Dashboard</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#020617,#0f172a,#020617);
color:white;
display:flex;
}

/* SIDEBAR */

.sidebar{

width:230px;
height:100vh;
background:linear-gradient(#020617,#020617,#0f172a);
padding:20px;

box-shadow:0 0 20px black;

}

.sidebar h2{
color:#38bdf8;
}

.sidebar a{

display:block;
color:white;
padding:10px;
margin:6px 0;
cursor:pointer;
border-radius:6px;

}

.sidebar a:hover{

background:#1e293b;

}


/* MAIN */

.main{

flex:1;
padding:20px;

background:
radial-gradient(circle at 20% 20%,#0ea5e955,transparent),
radial-gradient(circle at 80% 60%,#9333ea55,transparent);

}


/* TOPBAR */

.topbar{

background:rgba(255,255,255,0.05);
padding:12px;
border-radius:8px;
margin-bottom:20px;

backdrop-filter:blur(10px);

}


/* PAGE */

.page{
display:none;
}

.active{
display:block;
}


/* CARD */

.card{

background:rgba(255,255,255,0.08);
padding:20px;
border-radius:12px;
margin:10px 0;

backdrop-filter:blur(10px);

box-shadow:0 0 15px rgba(0,0,0,0.5);

}


/* STATS */

.stats{

display:flex;
gap:15px;
flex-wrap:wrap;

}

.stat{

flex:1;
min-width:150px;

background:rgba(255,255,255,0.08);
padding:15px;
border-radius:10px;

text-align:center;

}


/* INPUT */

input{

width:100%;
padding:8px;
margin:5px 0;

}


/* BUTTON */

button{

padding:8px 12px;
background:#38bdf8;
border:none;
cursor:pointer;
border-radius:5px;

}


</style>

</head>

<body>


<!-- SIDEBAR -->

<div class="sidebar">

<h2>ExamPro</h2>

<a onclick="show('home')">
<i class="fa fa-home"></i> Home
</a>

<a onclick="show('login')">
<i class="fa fa-user"></i> Login
</a>

<a onclick="show('admin')">
<i class="fa fa-plus"></i> Add Question
</a>

<a onclick="show('exam')">
<i class="fa fa-file"></i> Exam
</a>

<a onclick="show('result')">
<i class="fa fa-chart-bar"></i> Result
</a>

</div>



<!-- MAIN -->

<div class="main">

<div class="topbar">

Dashboard Panel

</div>



<!-- HOME -->

<div id="home" class="page active">

<div class="stats">

<div class="stat">
<i class="fa fa-user"></i>
<h3>120</h3>
Students
</div>

<div class="stat">
<i class="fa fa-file"></i>
<h3>15</h3>
Exams
</div>

<div class="stat">
<i class="fa fa-check"></i>
<h3>300</h3>
Results
</div>

</div>


<div class="card">

<h2>Online Examination System</h2>

<p>Web Technology Dashboard UI Project</p>

</div>

</div>



<!-- LOGIN -->

<div id="login" class="page">

<div class="card">

<h2>Login</h2>

<input placeholder="Username">
<input placeholder="Password">

<button onclick="show('exam')">

Login

</button>

</div>

</div>



<!-- ADMIN -->

<div id="admin" class="page">

<div class="card">

<h2>Add Question</h2>

<input placeholder="Question">

<input placeholder="Option 1">
<input placeholder="Option 2">
<input placeholder="Option 3">
<input placeholder="Option 4">

<input placeholder="Answer">

<button>Save</button>

</div>

</div>



<!-- EXAM -->

<div id="exam" class="page">

<div class="card">

<h2>Exam</h2>

<p>HTML stands for ?</p>

<input type="radio"> Hyper Text Markup Language
<br>
<input type="radio"> High Tool

<br><br>

<button onclick="show('result')">

Submit

</button>

</div>

</div>



<!-- RESULT -->

<div id="result" class="page">

<div class="card">

<h2>Result</h2>

<p style="font-size:22px;color:#22c55e">

Score : 8 / 10

</p>

</div>

</div>



</div>



<script>

function show(id){

let pages=document.querySelectorAll(".page");

pages.forEach(p=>p.classList.remove("active"));

document.getElementById(id).classList.add("active");

}

</script>


</body>
</html>
