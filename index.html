<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Dashboard | PBL Nexus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="flex h-screen">
    <aside class="w-72 bg-white border-r p-8 flex flex-col">
        <div class="font-bold text-2xl mb-12 text-teal-600">Nexus.</div>
        <nav class="space-y-2 flex-1">
            <button onclick="show('home')" class="sidebar-btn active"><i data-lucide="layout"></i> Overview</button>
            <button onclick="show('tasks')" class="sidebar-btn"><i data-lucide="check-circle"></i> My Tasks</button>
            <button onclick="show('upload')" class="sidebar-btn"><i data-lucide="upload-cloud"></i> Submissions</button>
        </nav>
        <a href="login.html" class="p-4 text-rose-500 font-bold">Sign Out</a>
    </aside>

    <main class="flex-1 overflow-y-auto p-12">
        <section id="home" class="section active">
            <div class="bg-slate-900 p-12 rounded-[3rem] text-white mb-10">
                <h2 class="text-4xl font-extrabold mb-2">Hello, Student!</h2>
                <p class="text-slate-400">Web Technology • Project Progress: 75%</p>
            </div>
            <div class="grid grid-cols-3 gap-6">
                <div class="glass-card p-6"> <p class="text-sm text-slate-400 font-bold">DEADLINE</p> <h3 class="text-2xl font-black">2 Days</h3> </div>
                <div class="glass-card p-6"> <p class="text-sm text-slate-400 font-bold">CREDITS</p> <h3 class="text-2xl font-black text-teal-600">12.0</h3> </div>
                <div class="glass-card p-6"> <p class="text-sm text-slate-400 font-bold">RANK</p> <h3 class="text-2xl font-black text-amber-500">#04</h3> </div>
            </div>
        </section>

        <section id="tasks" class="section">
            <h2 class="text-3xl font-black mb-8">Kanban Board</h2>
            <div class="grid grid-cols-2 gap-8">
                <div class="glass-card p-8">
                    <h4 class="font-bold mb-4 text-teal-600 underline">In Progress</h4>
                    <div class="p-4 bg-slate-50 rounded-xl mb-3">Setup Tailwind Config</div>
                    <div class="p-4 bg-slate-50 rounded-xl">Write JavaScript Logic</div>
                </div>
                <div class="glass-card p-8">
                    <h4 class="font-bold mb-4 text-slate-400 underline">Completed</h4>
                    <div class="p-4 bg-slate-50 rounded-xl line-through text-slate-300">Project Proposal</div>
                </div>
            </div>
        </section>

        <section id="upload" class="section">
            <h2 class="text-3xl font-black mb-8">Submissions</h2>
            <div class="glass-card p-20 text-center border-4 border-dashed border-slate-100">
                <p class="mb-6 text-slate-400 font-bold">Drop your index.html here</p>
                <button onclick="alert('Submission Success!')" class="bg-teal-600 text-white px-8 py-3 rounded-2xl font-bold">Submit Task</button>
            </div>
        </section>
    </main>

    <script>
        lucide.createIcons();
        function show(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
